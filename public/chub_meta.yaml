project_name: "Medieval Isekai World Engine"
tagline: "Deterministic open-world simulation layer for the Medieval Isekai setting."
visibility: "UNLISTED"
position: "ADJACENT"
tags:
  - "Stage"
  - "Fantasy"
  - "Dark Fantasy"
  - "Isekai"
  - "Open World"
  - "Simulation"

config_schema:
  type: object
  properties:
    worldSeed:
      type: string
      default: "medieval-isekai-v1"
    startRegionId:
      type: string
      enum:
        - "lumeria-heartlands"
        - "gursa-leymarsh"
        - "marusa-western-reach"
        - "orisc-seaboard"
        - "great-central-footholds"
      default: "lumeria-heartlands"
    startRole:
      type: string
      enum:
        - "reborn-wanderer"
        - "academy-hopeful"
        - "caravan-hand"
        - "castaway"
        - "minor-noble-exile"
      default: "reborn-wanderer"
    survivalMode:
      type: string
      enum:
        - "off"
        - "light"
        - "moderate"
      default: "light"
    injuryRealism:
      type: string
      enum:
        - "low"
        - "medium"
        - "high"
      default: "medium"
    weatherPersistence:
      type: string
      enum:
        - "low"
        - "medium"
        - "high"
      default: "medium"
    economyComplexity:
      type: string
      enum:
        - "simple"
        - "moderate"
      default: "simple"
    showMapPanel:
      type: boolean
      default: true

state_schema:
  init:
    type: object
    properties:
      worldSeed:
        type: string
      rulesetVersion:
        type: string
  message:
    type: object
    properties:
      clock:
        type: object
      player:
        type: object
      world:
        type: object
      scene:
        type: object
      ui:
        type: object
  chat:
    type: object
    properties:
      exploredLocations:
        type: array
      discoveredLoreEntries:
        type: array
      tutorialFlags:
        type: array
      unlockedSystems:
        type: array

github_path: 'https://github.com/turkathecow/WorldEngineChubStage'

